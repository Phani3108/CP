services:
  frontend:
    depends_on:
      - api
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9432:9432"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 9432 --reload

  # Postgres 16 WITH pgvector preinstalled. The app creates the `vector` extension and all
  # tables itself on first boot, and seeds admin@admin.com / admin — no manual DB setup.
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
